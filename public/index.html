<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 실시간 혼잡도</title>
<style>
  :root {
    --bg:#0d0f14; --surface:#161921; --surface2:#1e2230;
    --border:rgba(255,255,255,0.07); --text:#e8eaf0; --muted:#6b7280;
    --accent:#3b82f6;
    --붐빔:#ef4444; --약간붐빔:#f97316; --보통:#eab308; --여유:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Pretendard','Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
  .logo{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
  .logo span{color:var(--accent);}
  .update-info{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .dot-live{width:6px;height:6px;border-radius:50%;background:var(--여유);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .stats-bar{display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);}
  .stat-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:12px;}
  .stat-chip .num{font-size:16px;font-weight:700;}

  .main{display:flex;flex:1;overflow:hidden;}

  #sidebar{width:340px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-toolbar{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
  #search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;}
  #search:focus{border-color:var(--accent);}
  .filter-row,.cat-row{display:flex;gap:4px;flex-wrap:wrap;}
  .fbtn{font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.15s;}
  .fbtn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
  .fbtn.active{color:#fff;border-color:transparent;}
  .fbtn[data-level="전체"].active{background:var(--accent);}
  .fbtn[data-level="붐빔"].active{background:var(--붐빔);}
  .fbtn[data-level="약간 붐빔"].active{background:var(--약간붐빔);}
  .fbtn[data-level="보통"].active{background:var(--보통);color:#111;}
  .fbtn[data-level="여유"].active{background:var(--여유);color:#111;}
  .fbtn[data-cat].active{background:var(--accent);}
  .sort-row{display:flex;gap:4px;align-items:center;}
  .sort-label{font-size:11px;color:var(--muted);}
  select#sort-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;padding:3px 6px;outline:none;cursor:pointer;}

  #place-list{flex:1;overflow-y:auto;}
  #place-list::-webkit-scrollbar{width:4px;}
  #place-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .place-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;display:flex;align-items:center;gap:10px;}
  .place-item:hover{background:var(--surface2);}
  .place-item.selected{background:var(--surface2);border-left:3px solid var(--accent);}
  .rank{font-size:11px;color:var(--muted);width:22px;text-align:center;flex-shrink:0;}
  .place-info{flex:1;min-width:0;}
  .place-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .place-cat{font-size:10px;color:var(--muted);margin-top:2px;}
  .place-bar-wrap{width:50px;flex-shrink:0;}
  .place-bar-bg{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
  .place-bar-fill{height:3px;border-radius:2px;transition:width 0.4s;}
  .level-badge{font-size:10px;padding:2px 7px;border-radius:99px;flex-shrink:0;font-weight:600;white-space:nowrap;}
  .badge-붐빔{background:rgba(239,68,68,0.15);color:var(--붐빔);}
  .badge-약간붐빔{background:rgba(249,115,22,0.15);color:var(--약간붐빔);}
  .badge-보통{background:rgba(234,179,8,0.15);color:var(--보통);}
  .badge-여유{background:rgba(34,197,94,0.15);color:var(--여유);}
  .badge-unknown{background:rgba(107,114,128,0.15);color:var(--muted);}

  #map-wrap{flex:1;position:relative;}
  #map{width:100%;height:100%;}
  #map-overlay{position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:20;flex-direction:column;gap:12px;}
  #map-overlay p{font-size:13px;color:var(--muted);}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #detail-panel{position:absolute;top:12px;right:12px;width:260px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;z-index:10;display:none;}
  #detail-panel.show{display:block;}
  .dp-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;}
  .dp-name{font-size:15px;font-weight:700;margin-bottom:4px;padding-right:20px;}
  .dp-cat{font-size:11px;color:var(--muted);margin-bottom:12px;}
  .dp-level{font-size:22px;font-weight:700;margin-bottom:4px;}
  .dp-minmax{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .dp-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);}
  .dp-row:last-child{border-bottom:none;}
  .dp-row .label{color:var(--muted);}
  .dp-row .val{font-weight:500;}

  #legend{position:absolute;bottom:20px;left:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;z-index:10;font-size:11px;}
  .legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .legend-item:last-child{margin-bottom:0;}
  .legend-dot{width:10px;height:10px;border-radius:50%;}

  #toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;z-index:100;display:none;}
  #toast.show{display:block;}
  #progress-bar-wrap{width:160px;height:3px;background:var(--surface);border-radius:2px;margin-top:6px;overflow:hidden;}
  #progress-bar{height:3px;background:var(--accent);border-radius:2px;transition:width 0.3s;}

  .empty-msg{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;}
  #result-count{font-size:11px;color:var(--muted);margin-left:auto;}
</style>
</head>
<body>

<header>
  <div class="logo">서울 <span>실시간</span> 혼잡도</div>
  <div class="update-info">
    <div class="dot-live"></div>
    <span id="last-update">데이터 로딩 중...</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-chip"><div class="num" id="st-total" style="color:var(--accent)">-</div><div>전체</div></div>
  <div class="stat-chip"><div class="num" id="st-붐빔" style="color:var(--붐빔)">-</div><div>붐빔</div></div>
  <div class="stat-chip"><div class="num" id="st-약간붐빔" style="color:var(--약간붐빔)">-</div><div>약간붐빔</div></div>
  <div class="stat-chip"><div class="num" id="st-보통" style="color:var(--보통)">-</div><div>보통</div></div>
  <div class="stat-chip"><div class="num" id="st-여유" style="color:var(--여유)">-</div><div>여유</div></div>
</div>

<div class="main">
  <div id="sidebar">
    <div class="sidebar-toolbar">
      <input id="search" type="text" placeholder="장소명 검색..." oninput="applyFilters()">
      <div class="filter-row">
        <button class="fbtn active" data-level="전체" onclick="setLevel(this)">전체</button>
        <button class="fbtn" data-level="붐빔" onclick="setLevel(this)">붐빔</button>
        <button class="fbtn" data-level="약간 붐빔" onclick="setLevel(this)">약간붐빔</button>
        <button class="fbtn" data-level="보통" onclick="setLevel(this)">보통</button>
        <button class="fbtn" data-level="여유" onclick="setLevel(this)">여유</button>
      </div>
      <div class="cat-row" id="cat-row"></div>
      <div class="sort-row">
        <span class="sort-label">정렬:</span>
        <select id="sort-select" onchange="applyFilters()">
          <option value="congestion_desc">혼잡 높은 순</option>
          <option value="congestion_asc">혼잡 낮은 순</option>
          <option value="name_asc">이름순</option>
        </select>
        <span id="result-count"></span>
      </div>
    </div>
    <div id="place-list"></div>
  </div>

  <div id="map-wrap">
    <div id="map-overlay"><div class="spinner"></div><p>카카오맵 불러오는 중...</p></div>
    <div id="map"></div>
    <div id="detail-panel">
      <button class="dp-close" onclick="closeDetail()">✕</button>
      <div class="dp-name" id="dp-name"></div>
      <div class="dp-cat" id="dp-cat"></div>
      <div class="dp-level" id="dp-level"></div>
      <div class="dp-minmax" id="dp-minmax"></div>
      <div id="dp-rows"></div>
    </div>
    <div id="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--붐빔)"></div>붐빔</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--약간붐빔)"></div>약간 붐빔</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--보통)"></div>보통</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--여유)"></div>여유</div>
    </div>
  </div>
</div>

<div id="toast">
  <span id="progress-text">데이터 불러오는 중...</span>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5aeed6fd89c67015e6586dc78ba83be7&autoload=false"></script>

  {cd:'POI085',nm:'강서한강공원',cat:'공원'},{cd:'POI086',nm:'고척돔',cat:'공원'},{cd:'POI087',nm:'광나루한강공원',cat:'공원'},{cd:'POI088',nm:'광화문광장',cat:'공원'},{cd:'POI089',nm:'국립중앙박물관·용산가족공원',cat:'공원'},{cd:'POI090',nm:'난지한강공원',cat:'공원'},{cd:'POI091',nm:'남산공원',cat:'공원'},{cd:'POI092',nm:'노들섬',cat:'공원'},{cd:'POI093',nm:'뚝섬한강공원',cat:'공원'},{cd:'POI094',nm:'망원한강공원',cat:'공원'},{cd:'POI095',nm:'반포한강공원',cat:'공원'},{cd:'POI096',nm:'북서울꿈의숲',cat:'공원'},{cd:'POI098',nm:'서리풀공원·몽마르뜨공원',cat:'공원'},{cd:'POI099',nm:'서울광장',cat:'공원'},{cd:'POI100',nm:'서울대공원',cat:'공원'},{cd:'POI101',nm:'서울숲공원',cat:'공원'},{cd:'POI102',nm:'아차산',cat:'공원'},{cd:'POI103',nm:'양화한강공원',cat:'공원'},{cd:'POI104',nm:'어린이대공원',cat:'공원'},{cd:'POI105',nm:'여의도한강공원',cat:'공원'},{cd:'POI106',nm:'월드컵공원',cat:'공원'},{cd:'POI107',nm:'응봉산',cat:'공원'},{cd:'POI108',nm:'이촌한강공원',cat:'공원'},{cd:'POI109',nm:'잠실종합운동장',cat:'공원'},{cd:'POI110',nm:'잠실한강공원',cat:'공원'},{cd:'POI111',nm:'잠원한강공원',cat:'공원'},{cd:'POI112',nm:'청계산',cat:'공원'},{cd:'POI123',nm:'보라매공원',cat:'공원'},{cd:'POI124',nm:'서대문독립공원',cat:'공원'},{cd:'POI125',nm:'안양천',cat:'공원'},{cd:'POI126',nm:'여의서로',cat:'공원'},{cd:'POI127',nm:'올림픽공원',cat:'공원'},{cd:'POI128',nm:'홍제폭포',cat:'공원'},{cd:'POI129',nm:'송현녹지광장',cat:'공원'}
];

const LEVEL_COLORS = {'붐빔':'#ef4444','약간 붐빔':'#f97316','보통':'#eab308','여유':'#22c55e'};
const LEVEL_ORDER  = {'붐빔':4,'약간 붐빔':3,'보통':2,'여유':1};

let placeData = {};
let mapInstance = null;
let markers = {};
let selectedCd = null;
let activeLevel = '전체';
let activeCat = '전체';

// 카테고리 버튼
const cats = ['전체',...new Set(PLACES.map(p=>p.cat))];
const catRow = document.getElementById('cat-row');
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='fbtn'+(c==='전체'?' active':'');
  b.dataset.cat=c; b.textContent=c;
  b.onclick=function(){setCat(this);};
  catRow.appendChild(b);
});

function setLevel(btn){
  document.querySelectorAll('.filter-row .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeLevel=btn.dataset.level;
  applyFilters();
}
function setCat(btn){
  document.querySelectorAll('#cat-row .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat=btn.dataset.cat;
  applyFilters();
}
function getLevelColor(l){return LEVEL_COLORS[l]||'#6b7280';}
function getLevelScore(l){return LEVEL_ORDER[l]||0;}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const sort=document.getElementById('sort-select').value;
  let filtered=PLACES.filter(p=>{
    const d=placeData[p.cd];
    const level=d?.level||'';
    return (activeLevel==='전체'||level===activeLevel)&&(activeCat==='전체'||p.cat===activeCat)&&(!q||p.nm.includes(q));
  });
  filtered.sort((a,b)=>{
    const da=placeData[a.cd],db=placeData[b.cd];
    if(sort==='congestion_desc') return getLevelScore(db?.level)-getLevelScore(da?.level);
    if(sort==='congestion_asc')  return getLevelScore(da?.level)-getLevelScore(db?.level);
    return a.nm.localeCompare(b.nm,'ko');
  });
  document.getElementById('result-count').textContent=`${filtered.length}개`;
  const list=document.getElementById('place-list');
  if(!filtered.length){list.innerHTML='<div class="empty-msg">조건에 맞는 장소가 없습니다</div>';return;}
  list.innerHTML=filtered.map((p,i)=>{
    const d=placeData[p.cd];
    const level=d?.level||'로딩 중';
    const color=getLevelColor(level);
    const score=getLevelScore(level);
    const bc=level==='붐빔'?'badge-붐빔':level==='약간 붐빔'?'badge-약간붐빔':level==='보통'?'badge-보통':level==='여유'?'badge-여유':'badge-unknown';
    const barW=score?(score/4*100):0;
    const label=level==='약간 붐빔'?'약간붐빔':level;
    return `<div class="place-item${selectedCd===p.cd?' selected':''}" onclick="selectPlace('${p.cd}')">
      <div class="rank">${i+1}</div>
      <div class="place-info"><div class="place-name">${p.nm}</div><div class="place-cat">${p.cat}</div></div>
      <div class="place-bar-wrap"><div class="place-bar-bg"><div class="place-bar-fill" style="width:${barW}%;background:${color}"></div></div></div>
      <div class="level-badge ${bc}">${label}</div>
    </div>`;
  }).join('');
  updateStats();
}

function updateStats(){
  const levels=Object.values(placeData).map(d=>d.level);
  document.getElementById('st-total').textContent=PLACES.length;
  document.getElementById('st-붐빔').textContent=levels.filter(l=>l==='붐빔').length;
  document.getElementById('st-약간붐빔').textContent=levels.filter(l=>l==='약간 붐빔').length;
  document.getElementById('st-보통').textContent=levels.filter(l=>l==='보통').length;
  document.getElementById('st-여유').textContent=levels.filter(l=>l==='여유').length;
}

function selectPlace(cd){
  selectedCd=cd;
  refreshAllMarkers();
  applyFilters();
  const d=placeData[cd];
  const p=PLACES.find(x=>x.cd===cd);
  if(!p) return;
  if(d&&mapInstance&&d.lat&&d.lng){
    mapInstance.setCenter(new kakao.maps.LatLng(d.lat,d.lng));
    mapInstance.setLevel(4);
  }
  if(d) showDetail(p,d);
}

function showDetail(p,d){
  document.getElementById('dp-name').textContent=p.nm;
  document.getElementById('dp-cat').textContent=p.cat;
  const color=getLevelColor(d.level);
  document.getElementById('dp-level').textContent=d.level||'-';
  document.getElementById('dp-level').style.color=color;
  document.getElementById('dp-minmax').textContent=`최소 ${d.min||'-'}명 ~ 최대 ${d.max||'-'}명`;
  document.getElementById('dp-rows').innerHTML=[
    ['현재 인구 추정',d.current?`약 ${Number(d.current).toLocaleString()}명`:'-'],
    ['업데이트 시각',d.time||'-'],
  ].map(([l,v])=>`<div class="dp-row"><span class="label">${l}</span><span class="val">${v}</span></div>`).join('');
  document.getElementById('detail-panel').classList.add('show');
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('show');
  selectedCd=null;
  refreshAllMarkers();
  applyFilters();
}

// 마커 생성 - 선택 여부에 따라 크기/강조/투명도 다르게
function updateMarker(p){
  if(!mapInstance) return;
  const d=placeData[p.cd];
  if(!d||!d.lat||!d.lng) return;
  const color=getLevelColor(d.level);
  if(markers[p.cd]){markers[p.cd].setMap(null);delete markers[p.cd];}

  const isSelected = selectedCd === p.cd;
  const hasSelection = selectedCd !== null;
  const size   = isSelected ? 44 : 32;
  const height = isSelected ? 54 : 40;
  const opacity = hasSelection && !isSelected ? 0.25 : 1;
  const stroke = isSelected ? '#ffffff' : 'rgba(255,255,255,0.3)';
  const strokeW = isSelected ? 2.5 : 1.5;
  const ring = isSelected
    ? `<circle cx="16" cy="14" r="7.5" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>`
    : '';

  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${height}" viewBox="0 0 32 40" opacity="${opacity}">
    <ellipse cx="16" cy="37" rx="5" ry="2.5" fill="rgba(0,0,0,0.3)"/>
    <path d="M16 2C9.4 2 4 7.4 4 14c0 9 12 24 12 24S28 23 28 14C28 7.4 22.6 2 16 2z" fill="${color}" stroke="${stroke}" stroke-width="${strokeW}"/>
    <circle cx="16" cy="14" r="5" fill="rgba(255,255,255,0.25)"/>
    ${ring}
  </svg>`;

  const imgSrc='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
  const marker=new kakao.maps.Marker({
    position:new kakao.maps.LatLng(d.lat,d.lng),
    map:mapInstance,
    image:new kakao.maps.MarkerImage(
      imgSrc,
      new kakao.maps.Size(size,height),
      {offset:new kakao.maps.Point(size/2,height)}
    ),
    title:p.nm,
    zIndex: isSelected ? 10 : 1
  });
  kakao.maps.event.addListener(marker,'click',()=>{
    selectedCd=p.cd;
    refreshAllMarkers();
    applyFilters();
    showDetail(p,d);
    mapInstance.setCenter(new kakao.maps.LatLng(d.lat,d.lng));
    mapInstance.setLevel(4);
  });
  markers[p.cd]=marker;

  // updateMarker 함수 끝부분에 추가
if (d.lat && d.lng) {
  // 기존 마커 생성 코드 ...

  // 혼잡도 원 오버레이
  const radius = p.cat === '인구밀집지역' ? 250 :    // 역은 작게
                 p.cat === '발달상권' ? 500 :         // 상권은 넓게
                 600;                                 // 나머지

  const circle = new kakao.maps.Circle({
    center: new kakao.maps.LatLng(d.lat, d.lng),
    radius: radius,
    strokeWeight: 1,
    strokeColor: getLevelColor(d.level),
    strokeOpacity: 0.9,
    fillColor: getLevelColor(d.level),
    fillOpacity: 0.18 + (getLevelScore(d.level) * 0.08), // 붐빔일수록 진하게
    zIndex: selectedCd === p.cd ? 5 : 1
  });
  circle.setMap(mapInstance);

  // 나중에 관리하려면
  // if (!circles) circles = {}; circles[p.cd] = circle;
}
}

// 모든 마커 다시 그리기 (선택 상태 반영)
function refreshAllMarkers(){
  PLACES.forEach(p=>{ if(placeData[p.cd]) updateMarker(p); });
}

async function fetchAllData(){
  const toast=document.getElementById('toast');
  const prog=document.getElementById('progress-text');
  const bar=document.getElementById('progress-bar');
  toast.classList.add('show');
  const BATCH=5;
  let done=0;
  for(let i=0;i<PLACES.length;i+=BATCH){
    const batch=PLACES.slice(i,i+BATCH);
    await Promise.all(batch.map(async p=>{
      try{
        const res=await fetch(`${API_PROXY}?place=${encodeURIComponent(p.nm)}`);
        const json=await res.json();
        const row=json?.SeoulRtd?.row?.[0];
        if(row){
          placeData[p.cd]={
            level:row.AREA_CONGEST_LVL||'알 수 없음',
            min:row.PPLTN_MIN, max:row.PPLTN_MAX,
            current:Math.round((Number(row.PPLTN_MIN||0)+Number(row.PPLTN_MAX||0))/2),
            time:row.PPLTN_TIME?row.PPLTN_TIME.substring(0,16):'-',
            lat:Number(row.Y_COORD)||null,
            lng:Number(row.X_COORD)||null,
          };
          updateMarker(p);
        }
      }catch(e){}
      done++;
      const pct=Math.round(done/PLACES.length*100);
      prog.textContent=`데이터 불러오는 중... ${done}/${PLACES.length}`;
      bar.style.width=pct+'%';
      applyFilters();
    }));
    await new Promise(r=>setTimeout(r,80));
  }
  toast.classList.remove('show');
  const now=new Date();
  document.getElementById('last-update').textContent=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 업데이트됨`;
  applyFilters();
}


applyFilters();
kakao.maps.load(function(){
  document.getElementById('map-overlay').style.display='none';
  mapInstance=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(37.5326,127.024),level:8});
  fetchAllData();
});
setInterval(fetchAllData,5*60*1000);
</script>
