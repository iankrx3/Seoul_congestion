<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 실시간 혼잡도 핀포인트</title>
<style>
  :root {
    --bg:#0d0f14; --surface:#161921; --surface2:#1e2230;
    --border:rgba(255,255,255,0.07); --text:#e8eaf0; --muted:#6b7280;
    --accent:#3b82f6;
    --붐빔:#ef4444; --약간붐빔:#f97316; --보통:#eab308; --여유:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
  .logo{font-size:15px;font-weight:700;}
  .logo span{color:var(--accent);}

  .main{display:flex;flex:1;overflow:hidden;}
  #sidebar{width:340px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
  
  #place-list{flex:1;overflow-y:auto;}
  .place-item{padding:15px;border-bottom:1px solid var(--border);cursor:pointer;transition:0.2s;}
  .place-item:hover{background:var(--surface2);}
  .place-item.selected{background:var(--surface2);border-left:4px solid var(--accent);}
  
  .level-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold;margin-top:5px;}
  .bg-붐빔{background:var(--붐빔);color:white;}
  .bg-약간붐빔{background:var(--약간붐빔);color:white;}
  .bg-보통{background:var(--보통);color:black;}
  .bg-여유{background:var(--여유);color:white;}

  #map-wrap{flex:1;position:relative;}
  #map{width:100%;height:100%;}
  
  #detail-panel{position:absolute;top:20px;right:20px;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;z-index:100;display:none;box-shadow:0 10px 25px rgba(0,0,0,0.5);}
  #detail-panel.show{display:block;}
  .close-btn{float:right;cursor:pointer;color:var(--muted);}
</style>
</head>
<body>

<header>
  <div class="logo">서울 <span>실시간</span> 혼잡도</div>
  <div id="last-update" style="font-size:12px; color:var(--muted)">데이터 로딩 중...</div>
</header>

<div class="main">
  <div id="sidebar">
    <div style="padding:15px; border-bottom:1px solid var(--border)">
        <input id="search" type="text" placeholder="장소 검색..." style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;" oninput="renderList()">
    </div>
    <div id="place-list"></div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="detail-panel">
      <span class="close-btn" onclick="closeDetail()">✕</span>
      <h3 id="dp-name" style="margin-bottom:10px;">장소명</h3>
      <div id="dp-level" style="font-size:18px; font-weight:bold; margin-bottom:10px;">상태</div>
      <div id="dp-info" style="font-size:13px; color:var(--muted);">인구수 정보</div>
    </div>
  </div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5aeed6fd89c67015e6586dc78ba83be7&libraries=services"></script>

<script>
// 데이터 및 상태 관리
const PLACES = [
    {cd:'POI001',nm:'강남 MICE 관광특구'},{cd:'POI002',nm:'동대문 관광특구'},{cd:'POI003',nm:'명동 관광특구'},
    {cd:'POI014',nm:'강남역'},{cd:'POI015',nm:'건대입구역'},{cd:'POI033',nm:'서울역'},
    {cd:'POI072',nm:'여의도'},{cd:'POI073',nm:'연남동'},{cd:'POI101',nm:'서울숲공원'}
    // ... 필요한 장소 추가
];

let placeData = {};
let markers = {};
let selectedCd = null;
let map = null;

// 1. 지도 초기화
function initMap() {
    const container = document.getElementById('map');
    const options = {
        center: new kakao.maps.LatLng(37.5665, 126.9780),
        level: 8
    };
    map = new kakao.maps.Map(container, options);
    fetchAllData();
}

// 2. 데이터 가져오기
async function fetchAllData() {
    for (const p of PLACES) {
        try {
            const res = await fetch(`/api/congestion?place=${encodeURIComponent(p.nm)}`);
            const json = await res.json();
            const row = json?.SeoulRtd?.row?.[0];

            if (row) {
                placeData[p.cd] = {
                    nm: p.nm,
                    level: row.AREA_CONGEST_LVL,
                    min: row.PPLTN_MIN,
                    max: row.PPLTN_MAX,
                    lat: parseFloat(row.Y_COORD),
                    lng: parseFloat(row.X_COORD)
                };
                updateMarker(p.cd); // 데이터 오면 마커 그리기
            }
        } catch (e) {
            console.error(p.nm + " 로딩 실패");
        }
    }
    document.getElementById('last-update').textContent = "실시간 업데이트 완료";
    renderList();
}

// 3. 핀포인트(마커) 업데이트
function updateMarker(cd) {
    const data = placeData[cd];
    if (!data || !data.lat) return;

    // 기존 마커 제거
    if (markers[cd]) markers[cd].setMap(null);

    const isSelected = selectedCd === cd;
    const color = isSelected ? "#3b82f6" : getLevelColor(data.level);
    
    // 핀포인트 커스텀 오버레이 스타일 (SVG)
    const content = `
        <div onclick="selectPlace('${cd}')" style="cursor:pointer;">
            <svg width="32" height="40" viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 0C7.16 0 0 7.16 0 16C0 28 16 40 16 40C16 40 32 28 32 16C32 7.16 24.84 0 16 0Z" fill="${color}"/>
                <circle cx="16" cy="15" r="6" fill="white"/>
            </svg>
        </div>`;

    const overlay = new kakao.maps.CustomOverlay({
        position: new kakao.maps.LatLng(data.lat, data.lng),
        content: content,
        yAnchor: 1
    });

    overlay.setMap(map);
    markers[cd] = overlay;
}

// 4. 장소 선택 (이동 및 강조)
function selectPlace(cd) {
    selectedCd = cd;
    const data = placeData[cd];
    if (!data) return;

    // 지도 이동
    const moveLatLon = new kakao.maps.LatLng(data.lat, data.lng);
    map.panTo(moveLatLon);
    map.setLevel(4);

    // UI 업데이트
    renderList();
    showDetail(cd);
}

// 5. 리스트 그리기
function renderList() {
    const listEl = document.getElementById('place-list');
    const searchQ = document.getElementById('search').value;
    
    listEl.innerHTML = PLACES
        .filter(p => p.nm.includes(searchQ))
        .map(p => {
            const d = placeData[p.cd];
            const level = d ? d.level : '로딩중';
            const selectedClass = selectedCd === p.cd ? 'selected' : '';
            return `
                <div class="place-item ${selectedClass}" onclick="selectPlace('${p.cd}')">
                    <div style="font-weight:bold;">${p.nm}</div>
                    <div class="level-badge bg-${level.replace(' ','')}">${level}</div>
                </div>
            `;
        }).join('');
}

function getLevelColor(lvl) {
    if (lvl === '붐빔') return '#ef4444';
    if (lvl === '약간 붐빔') return '#f97316';
    if (lvl === '보통') return '#eab308';
    return '#22c55e';
}

function showDetail(cd) {
    const d = placeData[cd];
    document.getElementById('dp-name').textContent = d.nm;
    document.getElementById('dp-level').textContent = d.level;
    document.getElementById('dp-level').className = `bg-${d.level.replace(' ','')}`;
    document.getElementById('dp-info').textContent = `추정 인구: ${d.min} ~ ${d.max}명`;
    document.getElementById('detail-panel').classList.add('show');
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('show');
}

// 지도 로드 후 시작
window.onload = initMap;
</script>
</body>
</html>
